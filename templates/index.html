<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Companion</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f0f0; }
        #chat-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        #character-image { width: 200px; height: 200px; margin-bottom: 20px; border-radius: 50%; background: #ddd; object-fit: cover; }
        #status { min-height: 50px; margin-bottom: 20px; color: #333; }
        #text-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; margin-bottom: 10px; resize: none; }
        #send-button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #send-button:hover { background: #0056b3; }
        #voice-select { margin-top: 10px; width: 100%; padding: 5px; }
    </style>
</head>
<body>
    <div id="chat-container">
        <img id="character-image" src="" alt="Character">
        <div id="status">Hello! I'm your AI companion. How can I help you today?</div>
        <textarea id="text-input" placeholder="Type your message..."></textarea>
        <button id="send-button">Send</button>
        <select id="voice-select"></select>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
